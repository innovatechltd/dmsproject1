<svg viewBox="0 0 400 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="One-time passcode illustration">
  <defs>
    <linearGradient id="otp-ph" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F58220" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FFC56B" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <ellipse cx="200" cy="300" rx="150" ry="30" fill="currentColor" opacity="0.08"/>
  <!-- phone -->
  <g transform="translate(140 40)">
    <rect x="0" y="0" width="120" height="220" rx="22" fill="url(#otp-ph)"/>
    <rect x="10" y="14" width="100" height="192" rx="14" fill="#FFFFFF"/>
    <rect x="40" y="24" width="40" height="6" rx="3" fill="currentColor" opacity="0.2"/>
    <!-- OTP boxes -->
    <g transform="translate(20 70)">
      <rect x="0" y="0" width="18" height="24" rx="4" fill="#F58220" opacity="0.15" stroke="#F58220" stroke-width="2"/>
      <rect x="22" y="0" width="18" height="24" rx="4" fill="#F58220" opacity="0.15" stroke="#F58220" stroke-width="2"/>
      <rect x="44" y="0" width="18" height="24" rx="4" fill="#F58220" opacity="0.15" stroke="#F58220" stroke-width="2"/>
      <rect x="66" y="0" width="18" height="24" rx="4" fill="none" stroke="#F58220" stroke-width="2"/>
      <text x="9" y="18" font-family="sans-serif" font-size="14" font-weight="700" fill="#F58220" text-anchor="middle">4</text>
      <text x="31" y="18" font-family="sans-serif" font-size="14" font-weight="700" fill="#F58220" text-anchor="middle">2</text>
      <text x="53" y="18" font-family="sans-serif" font-size="14" font-weight="700" fill="#F58220" text-anchor="middle">9</text>
    </g>
    <rect x="24" y="120" width="72" height="20" rx="8" fill="#F58220"/>
  </g>
  <!-- shield + check badge -->
  <g transform="translate(250 60)">
    <path d="M50 0 100 18v42c0 32-22 52-50 62C22 112 0 92 0 60V18z" fill="#16A34A"/>
    <path d="M32 60l12 12 24-28" stroke="#fff" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- lock chip -->
  <g transform="translate(50 90)">
    <circle cx="24" cy="24" r="24" fill="#2563EB" opacity="0.85"/>
    <rect x="15" y="24" width="18" height="14" rx="3" fill="#fff"/>
    <path d="M17 24v-4a7 7 0 0 1 14 0v4" fill="none" stroke="#fff" stroke-width="3"/>
  </g>
</svg>
