<svg viewBox="0 0 400 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Reset password illustration">
  <defs>
    <linearGradient id="rs-key" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F58220"/>
      <stop offset="1" stop-color="#FFC56B"/>
    </linearGradient>
  </defs>
  <ellipse cx="200" cy="300" rx="150" ry="30" fill="currentColor" opacity="0.08"/>
  <!-- shield card -->
  <g transform="translate(120 50)">
    <path d="M80 0 160 30v70c0 52-36 84-80 100C36 184 0 152 0 100V30z" fill="#FFFFFF"/>
    <path d="M80 0 160 30v70c0 52-36 84-80 100C36 184 0 152 0 100V30z" fill="none" stroke="#F58220" stroke-opacity="0.3" stroke-width="3"/>
    <!-- key inside -->
    <g transform="translate(46 54)">
      <circle cx="26" cy="26" r="22" fill="none" stroke="url(#rs-key)" stroke-width="10"/>
      <path d="M44 34l30 30" stroke="url(#rs-key)" stroke-width="10" stroke-linecap="round"/>
      <path d="M60 50l10-10m-4 22l10-10" stroke="url(#rs-key)" stroke-width="8" stroke-linecap="round"/>
    </g>
  </g>
  <!-- rotating check badge -->
  <g transform="translate(280 40)">
    <circle cx="48" cy="48" r="48" fill="#16A34A"/>
    <path d="M30 50l12 12 22-26" stroke="#fff" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- lock chip -->
  <g transform="translate(40 200)">
    <rect width="36" height="36" rx="9" fill="#2563EB" opacity="0.85"/>
    <rect x="11" y="17" width="14" height="12" rx="3" fill="#fff"/>
    <path d="M13 17v-3a5 5 0 0 1 10 0v3" fill="none" stroke="#fff" stroke-width="3"/>
  </g>
</svg>
