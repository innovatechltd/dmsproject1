<svg viewBox="0 0 400 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Forgot password illustration">
  <defs>
    <linearGradient id="fg-env" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E9EEF7"/>
    </linearGradient>
  </defs>
  <ellipse cx="200" cy="300" rx="150" ry="30" fill="currentColor" opacity="0.08"/>
  <!-- envelope -->
  <g transform="translate(90 90)">
    <rect x="0" y="20" width="220" height="150" rx="14" fill="url(#fg-env)"/>
    <rect x="0" y="20" width="220" height="150" rx="14" fill="none" stroke="#F58220" stroke-opacity="0.25" stroke-width="2"/>
    <path d="M0 34 110 120 220 34" fill="none" stroke="#F58220" stroke-width="6" stroke-linejoin="round"/>
    <path d="M0 170 82 96" stroke="#F58220" stroke-opacity="0.3" stroke-width="4"/>
    <path d="M220 170 138 96" stroke="#F58220" stroke-opacity="0.3" stroke-width="4"/>
  </g>
  <!-- reset arrow badge -->
  <g transform="translate(240 30)">
    <circle cx="55" cy="55" r="55" fill="#F58220"/>
    <circle cx="55" cy="55" r="55" fill="none" stroke="#FFC56B" stroke-width="4"/>
    <path d="M78 40a30 30 0 1 0 6 26" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
    <path d="M84 30v18h-18" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- key chip -->
  <g transform="translate(40 60)">
    <rect width="34" height="34" rx="9" fill="#2563EB" opacity="0.85"/>
    <circle cx="13" cy="17" r="6" fill="none" stroke="#fff" stroke-width="3"/>
    <path d="M18 17h10m-4 0v6" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
